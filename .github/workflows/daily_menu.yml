name: 每日菜单推送

on:
  schedule:
    # UTC 00:00 = 北京时间 08:00，周一到周五触发
    - cron: '0 0 * * 1-5'
  # 允许手动触发，方便调试
  workflow_dispatch:

jobs:
  push-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: fan-cloud/requirements.txt

      - name: 安装依赖
        run: pip install -r fan-cloud/requirements.txt

      - name: 运行每日菜单推送
        working-directory: fan-cloud
        env:
          MINERU_TOKEN: ${{ secrets.MINERU_TOKEN }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python main.py
