name: 每日菜单推送

on:
  schedule:
    - cron: '20 0 * * *'   # UTC 00:20 = 北京时间 08:20  特色餐
    - cron: '30 3 * * *'   # UTC 03:30 = 北京时间 11:30  午餐自选
    - cron: '0  9 * * *'   # UTC 09:00 = 北京时间 17:00  晚餐自选
  workflow_dispatch:
    inputs:
      mode:
        description: '推送模式'
        required: true
        default: 'special'
        type: choice
        options:
          - special
          - lunch
          - dinner

jobs:
  push-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 判断推送模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            if [ "$HOUR" = "00" ]; then
              echo "mode=special" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "03" ]; then
              echo "mode=lunch" >> $GITHUB_OUTPUT
            else
              echo "mode=dinner" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 运行菜单推送
        env:
          MINERU_TOKEN: ${{ secrets.MINERU_TOKEN }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python main.py --mode ${{ steps.mode.outputs.mode }}
